name: digi-document-converter

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write

env:
  JF_URL: ${{ vars.JF_URL }}
  NUGET_REPO:   docportal-doc-converter-nuget-dev-virtual
  DOCKER_REPO:  docportal-doc-converter-docker-dev-virtual
  HELM_REPO:    docportal-doc-converter-helm-dev-virtual
  GENERIC_REPO:       docportal-doc-converter-generic-dev-virtual
  GENERIC_LOCAL_REPO: docportal-doc-converter-generic-dev-local
  APP_KEY:      docportal
  PROJECT_KEY:  docportal
  IMAGE_NAME:   digi-document-converter
  PKG_ID:       Digi.DocumentConverter.Core
  EVIDENCE_KEY_ALIAS: docportal-evidence-key

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    env:
      JFROG_CLI_LOG_LEVEL:          ${{ inputs.debug && 'DEBUG' || 'INFO' }}
      DOTNET_VERBOSITY:             ${{ inputs.debug && 'diagnostic' || 'minimal' }}
      Logging__LogLevel__Default:   ${{ inputs.debug && 'Debug' || 'Information' }}
    steps:
      - uses: actions/checkout@v5

      - name: Set version from file
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
          cache: true

      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: latest
          oidc-provider-name: github-docportal
        env:
          JF_URL: ${{ env.JF_URL }}

      - name: Verify JFrog connectivity (OIDC health check)
        run: jf rt ping

      - name: Curation audit — nuget
        run: |
          jf dotnetc --repo-resolve "$NUGET_REPO" --project "$PROJECT_KEY" --server-id "$SETUP_JFROG_CLI_SERVER_IDS"
          jf curation-audit

      - name: Restore & build
        run: |
          jf dotnetc --repo-resolve "$NUGET_REPO" --project "$PROJECT_KEY" --server-id "$SETUP_JFROG_CLI_SERVER_IDS"
          jf dotnet restore --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" -- --verbosity "$DOTNET_VERBOSITY"
          dotnet build -c Release --no-restore --verbosity "$DOTNET_VERBOSITY"

      - name: Commit NuGet lockfiles if generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add **/packages.lock.json
          git diff --staged --quiet || (git commit -m "chore: update NuGet lockfiles [skip ci]" && git push)

      - name: Unit tests
        run: dotnet test tests/DigiDocumentConverter.UnitTests \
              --logger "trx;LogFileName=unit.trx" --results-directory reports \
              --collect:"XPlat Code Coverage" --verbosity "$DOTNET_VERBOSITY"

      - name: Functional tests
        run: dotnet test tests/DigiDocumentConverter.FunctionalTests \
              --logger "trx;LogFileName=functional.trx" --results-directory reports \
              --verbosity "$DOTNET_VERBOSITY"

      - name: SonarQube scan
        continue-on-error: true
        env:
          SONAR_TOKEN: dummy-sonar-token
          SONAR_HOST_URL: http://localhost:9000
        run: |
          dotnet tool install --global dotnet-sonarscanner || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet sonarscanner begin /k:"docportal_digi-document-converter" \
            /d:sonar.host.url="$SONAR_HOST_URL" /d:sonar.login="$SONAR_TOKEN" || true
          dotnet build -c Release --no-incremental || true
          dotnet sonarscanner end /d:sonar.login="$SONAR_TOKEN" || true

      - name: Generate smoke + performance results (mocked)
        run: |
          mkdir -p reports
          cat > reports/smoke.json <<'JSON'
          { "suite":"smoke","service":"digi-document-converter","passed":2,"failed":0,
            "cases":[{"name":"health 200","status":"passed"},{"name":"convert json 200","status":"passed"}] }
          JSON
          cat > reports/performance.json <<'JSON'
          { "suite":"performance","tool":"k6","service":"digi-document-converter",
            "vus":30,"duration_s":60,"http_reqs":21044,"http_req_failed_rate":0.004,
            "p95_ms":221,"checks_passed":true,"thresholds_passed":true }
          JSON

      - name: Assemble test-result predicate
        run: |
          cat > reports/test-results-predicate.json <<JSON
          { "name":"digi-document-converter test results","result":"PASSED","build":"${VERSION}",
            "suites":{
              "unit":{"tool":"xunit","passed":true},
              "functional":{"tool":"xunit+WebApplicationFactory","passed":true},
              "smoke":{"tool":"bash+curl","source":"reports/smoke.json"},
              "performance":{"tool":"k6","source":"reports/performance.json"}},
            "timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)" }
          JSON

      # ---------- PUBLISH NUGET PACKAGE (Core library) ----------
      - name: Pack & push NuGet package
        run: |
          dotnet pack src/DigiDocumentConverter.Core/DigiDocumentConverter.Core.csproj \
            -c Release -p:Version="$VERSION" -o ./nupkg
          jf rt upload "nupkg/*.nupkg" "$NUGET_REPO/" \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}"

      - name: Docker login to JFrog registry
        run: jf docker login "${JF_URL#https://}"

      - name: Build & push Docker image
        run: |
          docker build -t "${JF_URL#https://}/$DOCKER_REPO/$IMAGE_NAME:$VERSION" \
            --metadata-file build-metadata --output=type=image --push .
          jf rt build-docker-create "$DOCKER_REPO" --image-file build-metadata \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}"

      - name: Package & push Helm chart
        run: |
          helm package helm/digi-document-converter --version "$VERSION" --app-version "$VERSION"
          jf rt upload "digi-document-converter-${VERSION}.tgz" "$HELM_REPO/" \
            --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}"

      - name: Upload test reports
        run: |
          jf rt upload "reports/*" "$GENERIC_REPO/$IMAGE_NAME/${{ github.run_number }}/reports/" \
            --flat=false --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}"

      - name: Publish build-info
        run: jf rt build-publish "$IMAGE_NAME" "${{ github.run_number }}" --project "$PROJECT_KEY"

      # ---------- EVIDENCE ----------
      # test results on the docker image
      - name: Evidence — test results (on docker package)
        run: |
          jf evd create \
            --package-name "$IMAGE_NAME" --package-version "$VERSION" --package-repo-name "$DOCKER_REPO" \
            --predicate reports/test-results-predicate.json \
            --predicate-type "https://in-toto.io/attestation/test-result/v0.1" \
            --attach-local reports/performance.json \
            --attach-artifactory-temp-path "$GENERIC_LOCAL_REPO/$IMAGE_NAME/${{ github.run_number }}/evidence-temp" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      # signature evidence on the NuGet package
      - name: Evidence — signature (on nuget package)
        run: |
          echo "{ \"actor\": \"${{ github.actor }}\", \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" }" > nuget-sig.json
          jf evd create \
            --package-name "$PKG_ID" --package-version "$VERSION" --package-repo-name "$NUGET_REPO" \
            --predicate nuget-sig.json \
            --predicate-type "https://jfrog.com/evidence/signature/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Evidence — SLSA provenance (on build)
        run: |
          cat > provenance.json <<JSON
          { "buildType":"https://github.com/actions/workflow",
            "builder": { "id":"https://github.com/${{ github.repository }}/actions" },
            "invocation": { "configSource": { "uri":"git+${{ github.server_url }}/${{ github.repository }}",
              "digest": {"sha1":"${{ github.sha }}"}, "entryPoint":".github/workflows/ci.yml" } } }
          JSON
          jf evd create --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --predicate provenance.json --predicate-type "https://slsa.dev/provenance/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Evidence — build signature
        run: |
          echo "{ \"actor\": \"${{ github.actor }}\", \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" }" > build-sig.json
          jf evd create --build-name "$IMAGE_NAME" --build-number "${{ github.run_number }}" \
            --predicate build-sig.json --predicate-type "https://jfrog.com/evidence/build-signature/v1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      # test results on the NuGet package (complements existing signature evidence)
      - name: Evidence — test results (nuget package)
        run: |
          jf evd create \
            --package-name "$PKG_ID" --package-version "$VERSION" \
            --package-repo-name "$NUGET_REPO" \
            --predicate reports/test-results-predicate.json \
            --predicate-type "https://in-toto.io/attestation/test-result/v0.1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      # test results on the Helm chart
      - name: Evidence — test results (helm chart)
        run: |
          jf evd create \
            --package-name "$IMAGE_NAME" --package-version "$VERSION" \
            --package-repo-name "$HELM_REPO" \
            --predicate reports/test-results-predicate.json \
            --predicate-type "https://in-toto.io/attestation/test-result/v0.1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Create release bundle
        run: |
          jf rbc "$IMAGE_NAME" "$VERSION" \
            --source-type-builds "name=$IMAGE_NAME, id=${{ github.run_number }}" \
            --project "$PROJECT_KEY"

      - name: Evidence — test results (release bundle)
        run: |
          jf evd create \
            --release-bundle-name "$IMAGE_NAME" --release-bundle-version "$VERSION" \
            --predicate reports/test-results-predicate.json \
            --predicate-type "https://in-toto.io/attestation/test-result/v0.1" \
            --key "${{ secrets.EVIDENCE_PRIVATE_KEY }}" --key-alias "$EVIDENCE_KEY_ALIAS"

      - name: Create AppTrust application version
        run: |
          jf api "/apptrust/api/v1/applications/$APP_KEY" 2>/dev/null | grep -q '"key"' \
            || jf apptrust app-create "$APP_KEY" \
                 --application-name "DocPortal" --project "$PROJECT_KEY"
          jf apptrust version-create "$APP_KEY" "$VERSION" \
            --source-type-builds "name=$IMAGE_NAME, id=${{ github.run_number }}"

      - name: Bump patch version
        if: success()
        run: |
          CURRENT=$(cat VERSION)
          NEW=$(echo "$CURRENT" | awk -F. -v OFS=. '{$NF = $NF + 1; print}')
          echo "$NEW" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $NEW [skip ci]"
          git push
